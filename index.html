<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#0f1117"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Mundial 2026"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>Mundial 2026</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0f1117;
      --bg2:#1a1e2a;
      --card:#1e2230;
      --ui:#2e3347;
      --border:#3a3f55;
      --txt:#8892a4;
      --lt:#b8c4d0;
      --pale:#dde4ec;
      --white:#f0f4f8;
      --gold:#f0b429;
      --goldd:rgba(240,180,41,0.25);
      --goldbg:rgba(240,180,41,0.09);
      --red:#e74c3c;
      --mono:'Courier New',monospace;
    }
    html,body{min-height:100%;background:var(--bg);color:var(--pale);font-family:system-ui,-apple-system,sans-serif;overflow-x:hidden;}
    input[type=number]{-moz-appearance:textfield;}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
    button{font-family:inherit;cursor:pointer;}

    /* HEADER */
    .hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px 0;position:sticky;top:0;z-index:100;}
    .hdr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
    .hdr-brand{display:flex;align-items:center;gap:10px;}
    .hdr-eye{font-size:10px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;font-family:var(--mono);}
    .hdr-yr{font-size:28px;font-weight:900;letter-spacing:-1px;line-height:1;color:var(--white);}
    .hdr-sub{font-size:10px;color:var(--txt);margin-top:3px;}
    .hdr-cnt{text-align:right;}
    .hdr-num{font-size:22px;font-family:var(--mono);color:var(--gold);font-weight:900;}
    .hdr-lbl{font-size:9px;color:var(--txt);text-transform:uppercase;letter-spacing:1px;}
    .nav{display:flex;overflow-x:auto;scrollbar-width:none;}
    .nav::-webkit-scrollbar{display:none;}
    .nav-btn{padding:9px 16px;border:none;background:transparent;color:var(--txt);border-bottom:2px solid transparent;font-size:11px;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;transition:all .15s;}
    .nav-btn.on{color:var(--gold);border-bottom-color:var(--gold);font-weight:700;}

    /* CONTENT */
    .content{padding:18px 14px;max-width:900px;margin:0 auto;}

    /* LOADING */
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px;}
    .spinner{width:36px;height:36px;border:3px solid var(--ui);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-txt{color:var(--txt);font-size:12px;}

    /* API STATUS */
    .api-bar{display:flex;align-items:center;gap:7px;margin-bottom:14px;font-size:11px;color:var(--txt);}
    .api-dot{width:7px;height:7px;border-radius:50%;background:#2ecc71;flex-shrink:0;animation:pulse 2s infinite;}
    .api-dot.err{background:var(--red);animation:none;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* ERROR */
    .err-box{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:12px;color:#e74c3c;}

    /* GROUP PILLS */
    .pills{display:flex;flex-wrap:nowrap;gap:6px;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;padding-bottom:4px;-webkit-overflow-scrolling:touch;margin-bottom:14px;}
    .pills::-webkit-scrollbar{display:none;}
    .pill{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--lt);font-family:var(--mono);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;scroll-snap-align:start;min-width:52px;transition:all .15s;}
    .pill.on{border-color:var(--gold);background:var(--goldbg);color:var(--gold);}
    .pill-lbl{font-weight:700;}
    .pill-sub{font-size:9px;color:var(--txt);}
    .pill.on .pill-sub{color:rgba(240,180,41,0.7);}

    /* NAV ARROWS */
    .grp-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .grp-nav-info{font-size:12px;color:var(--lt);font-family:var(--mono);}
    .grp-nav-info span{color:var(--gold);}
    .arrow-btn{background:var(--card);border:1px solid var(--border);color:var(--pale);border-radius:6px;padding:6px 14px;font-size:13px;transition:all .15s;}
    .arrow-btn:active,.arrow-btn:hover{background:var(--ui);border-color:var(--gold);color:var(--gold);}

    /* GROUP HEADER */
    .grp-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .grp-badge{background:var(--gold);color:#0f1117;width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;font-family:var(--mono);flex-shrink:0;}
    .grp-teams{font-size:12px;color:var(--lt);line-height:1.7;}

    /* SUB TABS */
    .sub-tabs{display:flex;gap:4px;margin-bottom:12px;}
    .sub-tab{padding:5px 14px;border-radius:5px;border:none;font-size:11px;text-transform:uppercase;letter-spacing:1px;transition:all .15s;}
    .sub-tab.on{background:var(--gold);color:#0f1117;font-weight:700;}
    .sub-tab:not(.on){background:var(--card);border:1px solid var(--border);color:var(--lt);}

    /* MATCH CARD */
    .match{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:7px;}
    .match.played{border-color:var(--goldd);background:rgba(240,180,41,0.05);}
    .match-row{display:flex;align-items:center;gap:10px;}
    .team{flex:1;font-size:13px;color:var(--pale);}
    .team.home{text-align:right;}
    .team.win{color:var(--gold);font-weight:700;}
    .score-box{display:flex;align-items:center;justify-content:center;min-width:64px;}
    .score-disp{font-family:var(--mono);font-size:20px;font-weight:900;color:var(--white);letter-spacing:3px;}
    .score-sep{color:var(--border);margin:0 3px;}
    .score-pend{font-family:var(--mono);font-size:14px;color:var(--border);}
    .match-meta{display:flex;justify-content:center;gap:10px;margin-top:6px;flex-wrap:wrap;}
    .match-meta span{font-size:10px;color:var(--txt);}
    .badge-ok{font-size:9px;background:rgba(46,204,113,0.12);color:#2ecc71;border:1px solid rgba(46,204,113,0.3);border-radius:3px;padding:1px 5px;font-family:var(--mono);}
    .scorers{font-size:10px;color:var(--txt);margin-top:5px;text-align:center;line-height:1.6;}

    /* STANDINGS */
    .table{margin-top:12px;background:var(--card);border-radius:8px;overflow:hidden;border:1px solid var(--border);}
    .t-head{display:grid;grid-template-columns:20px 1fr 28px 28px 28px 28px 34px 34px;font-size:9px;color:var(--txt);padding:7px 12px;border-bottom:1px solid var(--border);font-family:var(--mono);letter-spacing:1px;background:rgba(255,255,255,0.02);}
    .t-row{display:grid;grid-template-columns:20px 1fr 28px 28px 28px 28px 34px 34px;padding:8px 12px;font-size:11px;border-bottom:1px solid var(--ui);border-left:3px solid transparent;transition:background .15s;}
    .t-row:last-child{border-bottom:none;}
    .t-row.q{background:var(--goldbg);border-left-color:var(--gold);}
    .t-head span,.t-row span{text-align:center;}
    .t-head span:nth-child(2),.t-row span:nth-child(2){text-align:left;}
    .t-pos{color:var(--txt);font-family:var(--mono);font-size:10px;}
    .t-team{color:var(--pale);font-size:12px;}
    .t-row.q .t-team{color:var(--white);font-weight:600;}
    .t-num{color:var(--lt);font-family:var(--mono);}
    .t-pts{color:var(--gold)!important;font-weight:700;font-family:var(--mono);}

    /* ELIM */
    .rnd-hdr{font-size:10px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;font-family:var(--mono);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
    .rnd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-bottom:26px;}
    .elim-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:11px 13px;}
    .elim-lbl{font-size:9px;color:var(--txt);letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:8px;}
    .elim-row{display:flex;align-items:center;gap:6px;justify-content:center;}
    .elim-t{flex:1;font-size:11px;color:var(--pale);}
    .elim-t.l{text-align:right;}
    .elim-t.tbd{color:var(--border);}
    .elim-score{font-family:var(--mono);font-size:16px;color:var(--white);font-weight:900;white-space:nowrap;}

    /* STATS */
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px;}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 10px;text-align:center;}
    .stat-v{font-size:26px;color:var(--gold);font-family:var(--mono);font-weight:900;}
    .stat-tot{font-size:12px;color:var(--txt);}
    .stat-l{font-size:10px;color:var(--lt);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
    .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .bar-key{color:var(--gold);font-family:var(--mono);font-size:11px;width:14px;}
    .bar-track{flex:1;background:var(--ui);border-radius:4px;height:12px;overflow:hidden;}
    .bar-fill{height:100%;background:linear-gradient(90deg,#1a6b3c,var(--gold));border-radius:4px;transition:width .5s;}
    .bar-val{color:var(--lt);font-family:var(--mono);font-size:10px;width:22px;text-align:right;}

    /* SCORER TABLE */
    .scorer-table{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
    .scorer-head{display:grid;grid-template-columns:28px 1fr 1fr 28px;font-size:9px;color:var(--txt);padding:7px 12px;border-bottom:1px solid var(--border);font-family:var(--mono);letter-spacing:1px;background:rgba(255,255,255,0.02);}
    .scorer-row{display:grid;grid-template-columns:28px 1fr 1fr 28px;padding:9px 12px;font-size:12px;border-bottom:1px solid var(--ui);align-items:center;border-left:3px solid transparent;}
    .scorer-row:last-child{border-bottom:none;}
    .scorer-row.top{background:var(--goldbg);border-left-color:var(--gold);}
    .scorer-pos{color:var(--txt);font-family:var(--mono);font-size:10px;}
    .scorer-name{color:var(--pale);}
    .scorer-row.top .scorer-name{color:var(--white);font-weight:600;}
    .scorer-team{color:var(--lt);font-size:11px;}
    .scorer-n{color:var(--gold);font-family:var(--mono);font-weight:900;text-align:center;font-size:15px;}

    /* SWIPE DOTS */
    .swipe-hint{display:flex;justify-content:center;gap:5px;margin-top:14px;}
    .sdot{width:5px;height:5px;border-radius:50%;background:var(--border);transition:all .2s;}
    .sdot.on{background:var(--gold);transform:scale(1.4);}

    .footer{text-align:center;padding:16px;border-top:1px solid var(--ui);font-size:9px;color:var(--txt);}
    @supports(padding-bottom:env(safe-area-inset-bottom)){.footer{padding-bottom:calc(16px + env(safe-area-inset-bottom));}}
  </style>
</head>
<body>
<div id="app">
  <div class="loading"><div class="spinner"></div><div class="loading-txt">Cargando resultados...</div></div>
</div>
<script>
const GRUPOS={
  "Group A":["Mexico","South Africa","South Korea","Czech Republic"],
  "Group B":["Canada","Bosnia and Herzegovina","Qatar","Switzerland"],
  "Group C":["Brazil","Morocco","Haiti","Scotland"],
  "Group D":["USA","Paraguay","Australia","Turkey"],
  "Group E":["Germany","Curaçao","Ivory Coast","Ecuador"],
  "Group F":["Netherlands","Japan","Sweden","Tunisia"],
  "Group G":["Belgium","Egypt","Iran","New Zealand"],
  "Group H":["Spain","Cape Verde","Saudi Arabia","Uruguay"],
  "Group I":["France","Senegal","Iraq","Norway"],
  "Group J":["Argentina","Algeria","Austria","Jordan"],
  "Group K":["Portugal","DR Congo","Uzbekistan","Colombia"],
  "Group L":["England","Croatia","Ghana","Panama"],
};
const GRP_KEYS=Object.keys(GRUPOS);
const GRP_LTR={"Group A":"A","Group B":"B","Group C":"C","Group D":"D","Group E":"E","Group F":"F","Group G":"G","Group H":"H","Group I":"I","Group J":"J","Group K":"K","Group L":"L"};
const FLAGS={"Mexico":"🇲🇽","South Africa":"🇿🇦","South Korea":"🇰🇷","Czech Republic":"🇨🇿","Canada":"🇨🇦","Bosnia and Herzegovina":"🇧🇦","Qatar":"🇶🇦","Switzerland":"🇨🇭","Brazil":"🇧🇷","Morocco":"🇲🇦","Haiti":"🇭🇹","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","USA":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺","Turkey":"🇹🇷","Germany":"🇩🇪","Curaçao":"🇨🇼","Ivory Coast":"🇨🇮","Ecuador":"🇪🇨","Netherlands":"🇳🇱","Japan":"🇯🇵","Sweden":"🇸🇪","Tunisia":"🇹🇳","Belgium":"🇧🇪","Egypt":"🇪🇬","Iran":"🇮🇷","New Zealand":"🇳🇿","Spain":"🇪🇸","Cape Verde":"🇨🇻","Saudi Arabia":"🇸🇦","Uruguay":"🇺🇾","France":"🇫🇷","Senegal":"🇸🇳","Iraq":"🇮🇶","Norway":"🇳🇴","Argentina":"🇦🇷","Algeria":"🇩🇿","Austria":"🇦🇹","Jordan":"🇯🇴","Portugal":"🇵🇹","DR Congo":"🇨🇩","Uzbekistan":"🇺🇿","Colombia":"🇨🇴","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croatia":"🇭🇷","Ghana":"🇬🇭","Panama":"🇵🇦"};
const NAMES={"Mexico":"México","South Africa":"Sudáfrica","South Korea":"Corea del Sur","Czech Republic":"Rep. Checa","Canada":"Canadá","Bosnia and Herzegovina":"Bosnia-Herz.","Qatar":"Qatar","Switzerland":"Suiza","Brazil":"Brasil","Morocco":"Marruecos","Haiti":"Haití","Scotland":"Escocia","USA":"EE.UU.","Paraguay":"Paraguay","Australia":"Australia","Turkey":"Turquía","Germany":"Alemania","Curaçao":"Curazao","Ivory Coast":"Costa de Marfil","Ecuador":"Ecuador","Netherlands":"Países Bajos","Japan":"Japón","Sweden":"Suecia","Tunisia":"Túnez","Belgium":"Bélgica","Egypt":"Egipto","Iran":"Irán","New Zealand":"Nueva Zelanda","Spain":"España","Cape Verde":"Cabo Verde","Saudi Arabia":"Arabia Saudí","Uruguay":"Uruguay","France":"Francia","Senegal":"Senegal","Iraq":"Irak","Norway":"Noruega","Argentina":"Argentina","Algeria":"Argelia","Austria":"Austria","Jordan":"Jordania","Portugal":"Portugal","DR Congo":"R.D. Congo","Uzbekistan":"Uzbekistán","Colombia":"Colombia","England":"Inglaterra","Croatia":"Croacia","Ghana":"Ghana","Panama":"Panamá"};
function fl(t){return FLAGS[t]||"🏳️";}
function nm(t){return NAMES[t]||t;}

let matches=[],activeTab="grupos",activeGroup="Group A",groupSub={},lastUpdate=null,apiError=false;

const API="https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json";
async function fetchData(){
  try{
    const r=await fetch(API+"?t="+Date.now());
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();
    matches=d.matches||[];
    lastUpdate=new Date();apiError=false;
  }catch(e){apiError=true;}
  render();
}

function hasScore(m){return m.score&&m.score.ft&&m.score.ft.length===2;}
function groupMatches(g){return matches.filter(m=>m.group===g);}

function calcStandings(grp){
  const t={};
  GRUPOS[grp].forEach(tm=>{t[tm]={pts:0,gf:0,ga:0,gd:0,w:0,d:0,l:0,p:0};});
  groupMatches(grp).forEach(m=>{
    if(!hasScore(m))return;
    const[h,a]=m.score.ft,ht=m.team1,at=m.team2;
    if(!t[ht]||!t[at])return;
    t[ht].p++;t[at].p++;t[ht].gf+=h;t[ht].ga+=a;t[at].gf+=a;t[at].ga+=h;
    t[ht].gd=t[ht].gf-t[ht].ga;t[at].gd=t[at].gf-t[at].ga;
    if(h>a){t[ht].pts+=3;t[ht].w++;t[at].l++;}
    else if(h<a){t[at].pts+=3;t[at].w++;t[ht].l++;}
    else{t[ht].pts++;t[at].pts++;t[ht].d++;t[at].d++;}
  });
  return Object.entries(t).sort((a,b)=>b[1].pts-a[1].pts||b[1].gd-a[1].gd||b[1].gf-a[1].gf);
}
function getTop2(g){const s=calcStandings(g);return[s[0]?.[0],s[1]?.[0]];}
function played(){return matches.filter(m=>m.group&&hasScore(m)).length;}
function total(){return matches.filter(m=>m.group).length;}
function fmtDate(d){return d?new Date(d).toLocaleDateString("es-ES",{day:"numeric",month:"short"}):""}

function render(){
  document.getElementById("app").innerHTML=`
    <div class="hdr">
      <div class="hdr-top">
        <div class="hdr-brand">
          <span style="font-size:26px">⚽</span>
          <div>
            <div class="hdr-eye">FIFA World Cup</div>
            <div class="hdr-yr">2026</div>
            <div class="hdr-sub">🇺🇸 USA · 🇨🇦 CAN · 🇲🇽 MEX · 11 Jun – 19 Jul</div>
          </div>
        </div>
        <div class="hdr-cnt">
          <div class="hdr-num">${played()}<span style="font-size:12px;color:var(--txt);font-weight:400">/${total()}</span></div>
          <div class="hdr-lbl">partidos</div>
        </div>
      </div>
      <nav class="nav">
        ${["grupos","eliminatoria","estadísticas"].map(t=>`<button class="nav-btn ${activeTab===t?"on":""}" data-tab="${t}">${t}</button>`).join("")}
      </nav>
    </div>
    <div class="content">
      <div class="api-bar">
        <span class="api-dot ${apiError?"err":""}"></span>
        <span>${apiError?"Sin conexión — mostrando últimos datos":"Resultados en tiempo real"}${lastUpdate?" · "+lastUpdate.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"}):""}</span>
      </div>
      ${apiError?`<div class="err-box">⚠ No se pudo conectar. <a href="#" onclick="location.reload()" style="color:var(--gold)">Reintentar</a></div>`:""}
      ${activeTab==="grupos"?renderGroups():activeTab==="eliminatoria"?renderElim():renderStats()}
    </div>
    <div class="footer">IÑAKI GARCIA 2026 · Actualización automática cada 5 minutos</div>
  `;
  bindEvents();
  if(activeTab==="grupos") scrollPill();
}

function renderGroups(){
  const grp=activeGroup,idx=GRP_KEYS.indexOf(grp),sub=groupSub[grp]||"partidos";
  const ms=groupMatches(grp),p=ms.filter(m=>hasScore(m)).length;
  return`
    <div class="pills" id="pills">
      ${GRP_KEYS.map(gk=>{
        const pp=groupMatches(gk).filter(m=>hasScore(m)).length;
        return`<button class="pill ${activeGroup===gk?"on":""}" data-group="${gk}">
          <span class="pill-lbl">${GRP_LTR[gk]}</span>
          <span class="pill-sub">${pp}/${groupMatches(gk).length}</span>
        </button>`;
      }).join("")}
    </div>
    <div class="grp-nav">
      <button class="arrow-btn" data-dir="-1">‹ Ant.</button>
      <div class="grp-nav-info">Grupo ${GRP_LTR[grp]} <span>${idx+1}/12</span></div>
      <button class="arrow-btn" data-dir="1">Sig. ›</button>
    </div>
    <div class="grp-hdr">
      <div class="grp-badge">${GRP_LTR[grp]}</div>
      <div class="grp-teams">${GRUPOS[grp].map(t=>`${fl(t)} ${nm(t)}`).join(" · ")}</div>
    </div>
    <div class="sub-tabs">
      <button class="sub-tab ${sub==="partidos"?"on":""}" data-sub="partidos">Partidos</button>
      <button class="sub-tab ${sub==="clasificación"?"on":""}" data-sub="clasificación">Clasificación</button>
    </div>
    <div id="swipe-area">
      ${sub==="partidos"
        ?(ms.length?ms.map(m=>renderMatch(m)).join(""):`<div style="color:var(--txt);text-align:center;padding:30px;font-size:13px">Sin partidos registrados</div>`)
        :renderStandings(grp)}
    </div>
    <div class="swipe-hint">${GRP_KEYS.map((_,i)=>`<div class="sdot ${i===idx?"on":""}"></div>`).join("")}</div>
  `;
}

function renderMatch(m){
  const ok=hasScore(m);
  const[h,a]=ok?m.score.ft:[null,null];
  const hW=ok&&h>a,aW=ok&&a>h;
  const s1=(m.goals1||[]).map(g=>`${g.name} ${g.minute}'`).join(", ");
  const s2=(m.goals2||[]).map(g=>`${g.name} ${g.minute}'`).join(", ");
  return`
    <div class="match ${ok?"played":""}">
      <div class="match-row">
        <span class="team home ${hW?"win":""}">${nm(m.team1)} ${fl(m.team1)}</span>
        <div class="score-box">
          ${ok?`<span class="score-disp">${h}<span class="score-sep">:</span>${a}</span>`
              :`<span class="score-pend">– : –</span>`}
        </div>
        <span class="team ${aW?"win":""}">${fl(m.team2)} ${nm(m.team2)}</span>
      </div>
      ${ok&&(s1||s2)?`<div class="scorers">${s1?`⚽ ${s1}`:""}${s1&&s2?" &nbsp;·&nbsp; ":""}${s2?`⚽ ${s2}`:""}</div>`:""}
      <div class="match-meta">
        <span>📅 ${fmtDate(m.date)}</span>
        ${m.ground?`<span>📍 ${m.ground}</span>`:""}
        ${ok?`<span class="badge-ok">✓ oficial</span>`:""}
      </div>
    </div>`;
}

function renderStandings(grp){
  return`
    <div class="table">
      <div class="t-head"><span>#</span><span>Equipo</span><span>PJ</span><span>G</span><span>E</span><span>P</span><span>GD</span><span style="color:var(--gold)">PTS</span></div>
      ${calcStandings(grp).map(([team,s],i)=>`
        <div class="t-row ${i<2?"q":""}">
          <span class="t-pos">${i+1}</span>
          <span class="t-team">${fl(team)} ${nm(team)}</span>
          <span class="t-num">${s.p}</span><span class="t-num">${s.w}</span>
          <span class="t-num">${s.d}</span><span class="t-num">${s.l}</span>
          <span class="t-num">${s.gd>=0?"+"+s.gd:s.gd}</span>
          <span class="t-pts">${s.pts}</span>
        </div>`).join("")}
    </div>`;
}

function renderElim(){
  const elim=matches.filter(m=>!m.group);
  if(elim.length>0){
    const rounds=[...new Set(elim.map(m=>m.round))];
    return rounds.map(r=>`
      <div class="rnd-hdr">${r}</div>
      <div class="rnd-grid">${elim.filter(m=>m.round===r).map(m=>{
        const ok=hasScore(m);const[h,a]=ok?m.score.ft:[null,null];
        return`<div class="elim-card">
          <div class="elim-lbl">${m.round||""}</div>
          <div class="elim-row">
            <span class="elim-t l ${ok&&h>a?"win":""}">${fl(m.team1)} ${nm(m.team1)}</span>
            <span class="elim-score">${ok?h+":"+a:"–:–"}</span>
            <span class="elim-t ${ok&&a>h?"win":""}">${fl(m.team2)} ${nm(m.team2)}</span>
          </div>
        </div>`;
      }).join("")}</div>`).join("");
  }
  const cruces=[
    {l:"1A vs 2B",h:getTop2("Group A")[0],a:getTop2("Group B")[1]},
    {l:"1B vs 2A",h:getTop2("Group B")[0],a:getTop2("Group A")[1]},
    {l:"1C vs 2D",h:getTop2("Group C")[0],a:getTop2("Group D")[1]},
    {l:"1D vs 2C",h:getTop2("Group D")[0],a:getTop2("Group C")[1]},
    {l:"1E vs 2F",h:getTop2("Group E")[0],a:getTop2("Group F")[1]},
    {l:"1F vs 2E",h:getTop2("Group F")[0],a:getTop2("Group E")[1]},
    {l:"1G vs 2H",h:getTop2("Group G")[0],a:getTop2("Group H")[1]},
    {l:"1H vs 2G",h:getTop2("Group H")[0],a:getTop2("Group G")[1]},
    {l:"1I vs 2J",h:getTop2("Group I")[0],a:getTop2("Group J")[1]},
    {l:"1J vs 2I",h:getTop2("Group J")[0],a:getTop2("Group I")[1]},
    {l:"1K vs 2L",h:getTop2("Group K")[0],a:getTop2("Group L")[1]},
    {l:"1L vs 2K",h:getTop2("Group L")[0],a:getTop2("Group K")[1]},
  ];
  return`
    <div class="rnd-hdr">DIECISEISAVOS DE FINAL</div>
    <div class="rnd-grid">${cruces.map(c=>`
      <div class="elim-card">
        <div class="elim-lbl">${c.l}</div>
        <div class="elim-row">
          <span class="elim-t l ${!c.h?"tbd":""}">${c.h?fl(c.h)+" "+nm(c.h):"Por definir"}</span>
          <span class="elim-score" style="color:var(--border)">–:–</span>
          <span class="elim-t ${!c.a?"tbd":""}">${c.a?fl(c.a)+" "+nm(c.a):"Por definir"}</span>
        </div>
      </div>`).join("")}</div>
    <div style="text-align:center;color:var(--txt);font-size:11px;padding:10px 0 20px">Cuartos, semis y final aparecerán automáticamente</div>`;
}

function renderStats(){
  let tG=0,tP=0;const pg=[];const goles={};
  GRP_KEYS.forEach(gk=>{
    let g=0;
    groupMatches(gk).forEach(m=>{
      if(hasScore(m)){g+=m.score.ft[0]+m.score.ft[1];tP++;}
      (m.goals1||[]).forEach(gl=>{if(!goles[gl.name])goles[gl.name]={n:0,team:m.team1};goles[gl.name].n++;});
      (m.goals2||[]).forEach(gl=>{if(!goles[gl.name])goles[gl.name]={n:0,team:m.team2};goles[gl.name].n++;});
    });
    tG+=g;pg.push({k:GRP_LTR[gk],g});
  });
  pg.sort((a,b)=>b.g-a.g);
  const avg=tP>0?(tG/tP).toFixed(1):"–";const maxG=pg[0]?.g||1;
  const top=Object.entries(goles).sort((a,b)=>b[1].n-a[1].n);
  return`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-v">${tP}<span class="stat-tot">/${total()}</span></div><div class="stat-l">Partidos</div></div>
      <div class="stat-card"><div class="stat-v">${tG}</div><div class="stat-l">Goles</div></div>
      <div class="stat-card"><div class="stat-v">${avg}</div><div class="stat-l">Media/ptdo</div></div>
    </div>
    <div class="rnd-hdr">Goles por grupo</div>
    ${pg.map(({k,g})=>`
      <div class="bar-row">
        <span class="bar-key">${k}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${maxG?g/maxG*100:0}%"></div></div>
        <span class="bar-val">${g}</span>
      </div>`).join("")}
    ${top.length?`
      <div class="rnd-hdr" style="margin-top:22px">⚽ Goleadores</div>
      <div class="scorer-table">
        <div class="scorer-head"><span>#</span><span>Jugador</span><span>Equipo</span><span style="text-align:center">⚽</span></div>
        ${top.map(([name,{n,team}],i)=>`
          <div class="scorer-row ${i===0?"top":""}">
            <span class="scorer-pos">${i+1}</span>
            <span class="scorer-name">${name}</span>
            <span class="scorer-team">${fl(team)} ${nm(team)}</span>
            <span class="scorer-n">${n}</span>
          </div>`).join("")}
      </div>`:""}`;
}

function changeGroup(d){
  const i=GRP_KEYS.indexOf(activeGroup);const n=Math.max(0,Math.min(11,i+d));
  if(n!==i){activeGroup=GRP_KEYS[n];render();}
}
function scrollPill(){
  const bar=document.getElementById("pills");const on=bar&&bar.querySelector(".pill.on");
  if(on&&bar)bar.scrollTo({left:on.offsetLeft-bar.clientWidth/2+on.clientWidth/2,behavior:"smooth"});
}

function bindEvents(){
  document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>{activeTab=b.dataset.tab;render();}));
  document.querySelectorAll("[data-group]").forEach(b=>b.addEventListener("click",()=>{activeGroup=b.dataset.group;render();}));
  document.querySelectorAll("[data-sub]").forEach(b=>b.addEventListener("click",()=>{groupSub[activeGroup]=b.dataset.sub;render();}));
  document.querySelectorAll("[data-dir]").forEach(b=>b.addEventListener("click",()=>changeGroup(parseInt(b.dataset.dir))));
  const area=document.getElementById("swipe-area");if(!area)return;
  let sx=0,sy=0;
  area.addEventListener("touchstart",e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  area.addEventListener("touchend",e=>{
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40)changeGroup(dx<0?1:-1);
  },{passive:true});
}

if("serviceWorker" in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
fetchData();setInterval(fetchData,5*60*1000);
</script>
